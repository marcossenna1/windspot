<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kite Spots Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --bg:#ffffff;--bg2:#f5f5f7;
  --text:#1a1a1a;--text2:#555558;--text3:#888890;
  --border:#e0e0e2;--border2:#d0d0d2;
  --radius-lg:14px;--radius-md:10px;
}
body{font-family:var(--font);background:#eeeef0;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.app{width:1000px;max-width:100%;height:860px;display:flex;flex-direction:column;border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg);box-shadow:0 8px 40px rgba(0,0,0,.10);}

/* TOP CHROME */
.topchrome{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:0.5px solid var(--border);}
.logo{font-size:15px;font-weight:500;white-space:nowrap;}
.search-wrap{flex:1;max-width:280px;position:relative;background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;display:flex;align-items:center;gap:6px;padding:5px 10px;}
.search-wrap input{flex:1;border:none;outline:none;background:transparent;font-size:13px;color:var(--text);font-family:var(--font);}
.search-wrap input::placeholder{color:var(--text3);}
.s-clear{font-size:14px;color:var(--text3);cursor:pointer;display:none;}
.sdrop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg);border:0.5px solid var(--border2);border-radius:10px;overflow:hidden;display:none;z-index:40;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.sdrop.open{display:block;}
.sdr{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-bottom:0.5px solid var(--border);font-size:13px;color:var(--text);}
.sdr:last-child{border-bottom:none;}.sdr:hover{background:var(--bg2);}
.sdr-info{flex:1;}.sdr-name{font-weight:500;}.sdr-sub{font-size:11px;color:var(--text3);}
.sdr-pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;}
.chrome-chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
.chrome-chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;font-size:11px;padding:3px 10px;border-radius:99px;border:0.5px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.chrome-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
.temp-toggle{display:flex;background:var(--bg2);border-radius:99px;padding:2px;gap:1px;}
.tt-btn{font-size:11px;font-weight:500;padding:3px 9px;border-radius:99px;cursor:pointer;color:var(--text3);transition:all .15s;}
.tt-btn.active{background:var(--bg);color:var(--text);border:0.5px solid var(--border);}
.share-btn{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;background:#25D366;border:none;cursor:pointer;font-size:11px;font-weight:500;color:#fff;font-family:var(--font);}
.tilt-btn{width:30px;height:30px;border-radius:6px;background:var(--bg2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.tilt-btn.on{background:rgba(24,95,165,.15);border-color:rgba(24,95,165,.4);}
.layer-bar{display:flex;background:var(--bg2);border-radius:6px;overflow:hidden;border:0.5px solid var(--border);}
.lb{font-size:11px;padding:3px 9px;cursor:pointer;color:var(--text3);transition:all .15s;border-right:0.5px solid var(--border);}
.lb:last-child{border-right:none;}.lb.on{background:var(--bg);color:var(--text);font-weight:500;}

/* MAIN BODY */
.main-body{flex:1;overflow:hidden;display:flex;position:relative;}
.left-col{display:flex;flex-direction:column;border-right:0.5px solid var(--border);flex-shrink:0;position:relative;}
.col-resize{position:absolute;right:-4px;top:0;bottom:0;width:8px;cursor:col-resize;z-index:20;display:flex;align-items:center;justify-content:center;}
.col-resize-line{width:3px;height:40px;border-radius:99px;background:var(--border2);}
.col-resize:hover .col-resize-line{background:#aaa;}
.map-area{flex:1;overflow:hidden;position:relative;min-height:200px;}
canvas#mc{position:absolute;inset:0;width:100%;height:100%;}
#map-rose{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:4;pointer-events:none;}
#map-arrows{position:absolute;inset:0;width:100%;height:100%;z-index:5;pointer-events:none;}
.map-pins{position:absolute;inset:0;z-index:6;}
.pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:all .2s;}
.pin-bub{border-radius:99px;padding:3px 8px;display:flex;align-items:center;gap:4px;border:2px solid rgba(255,255,255,.9);font-size:11px;font-weight:500;color:#fff;white-space:nowrap;transition:all .2s;}
.pin.active .pin-bub{transform:scale(1.15);}
.pin-lbl{position:absolute;top:calc(100% + 3px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.62);color:#fff;font-size:10px;padding:2px 6px;border-radius:99px;white-space:nowrap;}
.map-bot-overlay{position:absolute;bottom:10px;left:10px;z-index:10;}
.right-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:260px;}
.wind-legend{flex-shrink:0;display:flex;height:22px;border-bottom:0.5px solid var(--border);}
.wl-seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;white-space:nowrap;border-right:0.5px solid rgba(0,0,0,.08);}
.wl-seg:last-child{border-right:none;}
.spot-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}

/* SPOT ROW */
.spot-row{display:flex;align-items:center;border-bottom:0.5px solid var(--border);cursor:pointer;transition:opacity .12s;position:relative;min-height:68px;}
.spot-row:hover{opacity:.86;}
.spot-row.active-row{outline:1.5px solid var(--border2);outline-offset:-1px;}
.status-bar{width:3px;align-self:stretch;flex-shrink:0;z-index:1;}

/* ZONE 0 — grey ≤12kn: name/cam button */
.zone0{flex-shrink:0;display:flex;align-items:flex-end;padding:0 4px 6px 4px;z-index:1;overflow:hidden;}
.name-cam-btn{display:flex;align-items:center;gap:4px;padding:3px 6px 3px 4px;border-radius:6px;border:0.5px solid var(--border);background:rgba(255,255,255,.45);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;transition:background .12s;text-align:left;}
.name-cam-btn:hover{background:rgba(255,255,255,.75);border-color:var(--border2);}
.name-cam-btn.live{border-color:rgba(192,57,43,.4);background:rgba(192,57,43,.07);color:#6b1414;}
.name-cam-btn.live:hover{background:rgba(192,57,43,.14);}
.name-cam-btn.nocam{border-color:transparent;background:transparent;cursor:default;pointer-events:none;}
.btn-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}

/* ZONE 1 — green 13-19kn: meta + window */
.zone1{flex-shrink:0;display:flex;flex-direction:column;justify-content:space-between;padding:8px 6px 6px 6px;z-index:1;overflow:hidden;}
.z1-meta{font-size:11px;color:var(--text2);display:flex;flex-direction:column;gap:2px;}
.z1-meta-line{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:3px;}
.z1-win{font-size:10px;color:var(--text2);white-space:nowrap;}
.z1-win.nowin{color:#c0392b;}

/* ZONE 2 — yellow 20-29kn: compass */
.zone2{flex-shrink:0;display:flex;align-items:center;justify-content:center;z-index:1;}
.cw-wrap{position:relative;width:56px;height:56px;flex-shrink:0;}
.cw-wrap svg.cw-ring{position:absolute;inset:0;width:100%;height:100%;}
.cw-wrap canvas.cw-arrows{position:absolute;inset:0;width:100%;height:100%;}
.cw-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.cw-speed{font-size:15px;font-weight:500;line-height:1;}
.cw-gust{font-size:10px;line-height:1.2;margin-top:1px;opacity:.75;}

/* ZONE 3 — red 30+kn: air/water/waves */
.zone3{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 4px;z-index:1;}
.z3-row{display:flex;align-items:baseline;gap:3px;font-size:11px;line-height:1.25;white-space:nowrap;}
.z3-val{font-weight:500;color:var(--text);}
.z3-lbl{font-size:9px;color:var(--text2);}

/* ROW RIGHT */
.row-right{display:flex;align-items:center;gap:4px;padding:0 6px 0 4px;flex-shrink:0;}
.score-pill{font-size:11px;font-weight:500;padding:3px 7px;border-radius:6px;white-space:nowrap;background:rgba(255,255,255,.6);border:0.5px solid rgba(0,0,0,.1);}
.chevron{font-size:13px;color:var(--text3);flex-shrink:0;}

/* DETAIL OVERLAY */
.detail-overlay{position:absolute;top:0;right:0;bottom:0;width:340px;background:var(--bg);border-left:0.5px solid var(--border);z-index:30;display:flex;flex-direction:column;overflow:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1);transform:translateX(100%);}
.detail-overlay.open{transform:translateX(0);}
.dp-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.dp-close{width:26px;height:26px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text2);}
.dp-name{font-size:14px;font-weight:500;}.dp-sub{font-size:11px;color:var(--text3);}
.dp-tabs{display:flex;margin:7px 14px;background:var(--bg2);border-radius:8px;padding:3px;gap:2px;flex-shrink:0;}
.dp-tab{flex:1;text-align:center;font-size:12px;padding:4px 0;border-radius:6px;cursor:pointer;color:var(--text2);transition:all .15s;}
.dp-tab.active{background:var(--bg);color:var(--text);font-weight:500;border:0.5px solid var(--border);}
.dp-scroll{flex:1;overflow-y:auto;padding:0 14px 16px;}
.dm-grid{display:grid;grid-template-columns:auto 1fr 1fr;gap:6px;margin-bottom:8px;align-items:stretch;}
.dm3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:10px;}
.dm{background:var(--bg2);border-radius:8px;padding:9px 10px;}
.dm-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;}
.dm-val{font-size:17px;font-weight:500;line-height:1;}
.dm-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.rbar{height:5px;background:var(--bg2);border-radius:99px;position:relative;margin:8px 0 10px;}
.rbar-ideal{position:absolute;height:100%;border-radius:99px;background:rgba(42,157,92,.35);}
.rbar-dot{position:absolute;top:-5px;width:14px;height:14px;border-radius:50%;transform:translateX(-50%);border:2px solid var(--bg);}
.sec-lbl{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin:7px 0 5px;}
.win-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.wc{font-size:11px;padding:3px 9px;border-radius:7px;border:0.5px solid var(--border);color:var(--text2);}
.wc.best{background:rgba(42,157,92,.1);border-color:rgba(42,157,92,.4);color:#1a7a44;}
.htbl{width:100%;border-collapse:collapse;font-size:11px;}
.htbl th{font-size:10px;color:var(--text3);font-weight:500;text-align:left;padding:3px 4px;border-bottom:0.5px solid var(--border);}
.htbl td{padding:5px 4px;border-bottom:0.5px solid var(--border);color:var(--text2);}
.htbl tr.bh td{color:var(--text);}.htbl tr.bh td:first-child{font-weight:500;}
.wch{text-align:center;font-weight:500;border-radius:3px;padding:3px 4px;}

/* CAM MODAL */
.cam-modal-bg{display:none;position:absolute;inset:0;background:rgba(0,0,0,.72);z-index:50;align-items:center;justify-content:center;}
.cam-modal-bg.open{display:flex;}
.cam-modal{background:var(--bg);border-radius:var(--radius-lg);width:360px;overflow:hidden;}
.cam-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid var(--border);}
.cam-title{font-size:14px;font-weight:500;}
.cam-frame{width:100%;height:195px;background:#1a2535;position:relative;overflow:hidden;}
.cam-frame canvas{position:absolute;inset:0;width:100%;height:100%;}
.cam-live-badge{position:absolute;top:10px;left:10px;background:#c0392b;color:#fff;font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;letter-spacing:.06em;}
.cam-unavail{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(255,255,255,.5);}
.cam-info{padding:10px 14px 14px;}
.cam-info-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--text2);}
.cam-info-row span:first-child{color:var(--text3);}

/* SHARE MODAL */
.share-modal-bg{display:none;position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:60;align-items:center;justify-content:center;}
.share-modal-bg.open{display:flex;}
.share-modal{background:var(--bg);border-radius:var(--radius-lg);width:360px;padding:20px;}
.share-title{font-size:14px;font-weight:500;margin-bottom:4px;}
.share-sub{font-size:12px;color:var(--text3);margin-bottom:14px;}
.share-preview{background:var(--bg2);border-radius:var(--radius-md);padding:12px;margin-bottom:14px;font-size:12px;color:var(--text2);line-height:1.6;}
.share-actions{display:flex;gap:8px;}
.share-wa{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:#25D366;color:#fff;border-radius:10px;padding:10px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);}
.share-copy{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--bg2);border:0.5px solid var(--border2);color:var(--text);border-radius:10px;padding:10px 16px;font-size:13px;cursor:pointer;font-family:var(--font);}
.share-cancel{width:100%;margin-top:8px;padding:8px;text-align:center;font-size:13px;color:var(--text3);cursor:pointer;border:none;background:transparent;font-family:var(--font);}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- TOP CHROME -->
  <div class="topchrome">
    <div class="logo">🪁 Kite spots</div>
    <div class="search-wrap">
      <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" style="flex-shrink:0;opacity:.4"><circle cx="6" cy="6" r="4"/><line x1="9.5" y1="9.5" x2="13" y2="13"/></svg>
      <input id="sinput" placeholder="Search spots…" oninput="onSearch(this.value)" onfocus="onSearch(this.value)"/>
      <span class="s-clear" id="sclr" onclick="clearS()">&#x2715;</span>
      <div class="sdrop" id="sdrop"></div>
    </div>
    <div class="chrome-chips">
      <div class="chip active" onclick="setFilter('all',this)">All</div>
      <div class="chip" onclick="setFilter('fav',this)">⭐ Favs</div>
      <div class="chip" onclick="setFilter('nc',this)">North Carolina</div>
      <div class="chip" onclick="setFilter('fl',this)">Florida</div>
      <div class="chip" onclick="setFilter('near',this)">Nearby</div>
    </div>
    <div class="chrome-right">
      <div class="layer-bar">
        <span class="lb on" id="lb-sat" onclick="setLayer('sat')">Sat</span>
        <span class="lb" id="lb-wind" onclick="setLayer('wind')">Wind</span>
        <span class="lb" id="lb-rain" onclick="setLayer('rain')">Rain</span>
      </div>
      <div class="tilt-btn" id="tilt-btn" onclick="toggleTilt()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><path d="M8 2v3M8 11v3M2 8h3M11 8h3"/></svg>
      </div>
      <div class="temp-toggle">
        <div class="tt-btn active" id="tc-btn" onclick="setTemp('C')">°C</div>
        <div class="tt-btn" id="tf-btn" onclick="setTemp('F')">°F</div>
      </div>
      <button class="share-btn" onclick="openShare()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"><circle cx="4" cy="8" r="1.8"/><circle cx="12" cy="3" r="1.8"/><circle cx="12" cy="13" r="1.8"/><line x1="5.7" y1="7" x2="10.3" y2="4"/><line x1="5.7" y1="9" x2="10.3" y2="12"/></svg>
        Share
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-body" id="main-body">

    <!-- MAP COLUMN -->
    <div class="left-col" id="left-col" style="width:52%;">
      <div class="map-area" id="map-area">
        <canvas id="mc"></canvas>
        <svg id="map-rose" width="240" height="240" viewBox="0 0 240 240"></svg>
        <canvas id="map-arrows"></canvas>
        <div class="map-pins" id="pins"></div>
        <div class="map-bot-overlay">
          <div style="background:rgba(0,0,0,.52);border-radius:99px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,.8);" id="map-status"></div>
        </div>
      </div>
      <div class="col-resize" id="col-resize"><div class="col-resize-line"></div></div>
    </div>

    <!-- LIST COLUMN -->
    <div class="right-col">
      <div class="wind-legend" id="wind-legend"></div>
      <div class="spot-list" id="spot-list"></div>
    </div>

    <!-- DETAIL PANEL -->
    <div class="detail-overlay" id="dp" style="position:absolute;">
      <div class="dp-head">
        <div><div class="dp-name" id="dp-name">Salvo</div><div class="dp-sub" id="dp-sub">Hatteras, NC</div></div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;" id="dp-pill">Go · 88</span>
          <div class="dp-close" onclick="closeDetail()">&#x2715;</div>
        </div>
      </div>
      <div class="dp-tabs">
        <div class="dp-tab active" id="dpt-today" onclick="setDpTab('today')">Today</div>
        <div class="dp-tab" id="dpt-pro" onclick="setDpTab('pro')">Pro</div>
        <div class="dp-tab" id="dpt-week" onclick="setDpTab('week')">7 days</div>
      </div>
      <div class="dp-scroll" id="dp-body"></div>
    </div>

    <!-- CAM -->
    <div class="cam-modal-bg" id="cam-modal">
      <div class="cam-modal">
        <div class="cam-head"><div class="cam-title" id="cam-title">Camera</div><div class="dp-close" onclick="closeCam()">&#x2715;</div></div>
        <div class="cam-frame"><canvas id="cam-canvas"></canvas><div class="cam-live-badge" id="cam-live-badge">LIVE</div><div class="cam-unavail" id="cam-unavail" style="display:none">No camera</div></div>
        <div class="cam-info" id="cam-info"></div>
      </div>
    </div>

    <!-- SHARE -->
    <div class="share-modal-bg" id="share-modal">
      <div class="share-modal">
        <div class="share-title">Share forecast</div>
        <div class="share-sub">Send current conditions to WhatsApp</div>
        <div class="share-preview" id="share-preview"></div>
        <div class="share-actions">
          <button class="share-wa" onclick="sendWhatsApp()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.562 4.14 1.542 5.877L.054 23.5l5.773-1.516A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.885 0-3.648-.523-5.148-1.427l-.37-.22-3.428.9.916-3.342-.24-.383A9.943 9.943 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
            WhatsApp
          </button>
          <button class="share-copy" id="copy-btn" onclick="copyText()">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="5" y="5" width="9" height="9" rx="2"/><path d="M11 5V3a2 2 0 00-2-2H3a2 2 0 00-2 2v6a2 2 0 002 2h2"/></svg>
            Copy

/* ── WIND ZONE GRADIENT ── */
function windZoneGradient(wind,gusts){
  const wp=Math.min(100,wind/MAXKN*100),gp=Math.min(100,gusts/MAXKN*100);
  const stops=[];
  function seg(from,to,col){const c=Math.min(to,wp);if(c<=from)return;stops.push(`${col} ${from.toFixed(1)}%`,`${col} ${c.toFixed(1)}%`);}
  seg(0,B1,'rgba(140,140,140,.22)');seg(B1,B2,'rgba(42,157,92,.22)');seg(B2,B3,'rgba(204,170,0,.28)');seg(B3,100,'rgba(192,57,43,.22)');
  if(gp>wp){let gc='rgba(140,140,140,.1)';if(gp>B3)gc='rgba(192,57,43,.10)';else if(gp>B2)gc='rgba(204,170,0,.12)';else if(gp>B1)gc='rgba(42,157,92,.10)';stops.push(`${gc} ${wp.toFixed(1)}%`,`${gc} ${gp.toFixed(1)}%`);}
  const tail=Math.max(wp,gp);if(tail<100)stops.push(`transparent ${tail.toFixed(1)}%`,`transparent 100%`);
  return `linear-gradient(to right,${stops.join(',')})`;
}

/* ── COMPASS SVG ── */
function compassRingSVG(cx,cy,R,dirDeg,windColor,alpha){
  const labels=[{a:0,t:'N'},{a:45,t:'NE'},{a:90,t:'E'},{a:135,t:'SE'},{a:180,t:'S'},{a:225,t:'SW'},{a:270,t:'W'},{a:315,t:'NW'}];
  const sa=`rgba(255,255,255,${alpha})`;let s='';
  s+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${sa}" stroke-width="1.2"/>`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${R*.62}" fill="none" stroke="${sa}" stroke-width="0.6"/>`;
  for(let a=0;a<360;a+=10){const ar=(a-90)*Math.PI/180,major=a%45===0,mid=a%15===0&&!major;const r1=major?R*.82:mid?R*.87:R*.91,r2=R*.97,sw=major?1.4:mid?0.9:0.5,op=major?alpha*2.2:mid?alpha*1.6:alpha;s+=`<line x1="${cx+Math.cos(ar)*r1}" y1="${cy+Math.sin(ar)*r1}" x2="${cx+Math.cos(ar)*r2}" y2="${cy+Math.sin(ar)*r2}" stroke="rgba(255,255,255,${Math.min(.9,op)})" stroke-width="${sw}"/>`;}
  labels.forEach(l=>{const ar=(l.a-90)*Math.PI/180,lr=R*1.18,isMain=l.a%90===0;s+=`<text x="${cx+Math.cos(ar)*lr}" y="${cy+Math.sin(ar)*lr}" text-anchor="middle" dominant-baseline="central" font-size="${isMain?R*.24:R*.19}px" font-weight="${isMain?'700':'400'}" fill="rgba(255,255,255,${Math.min(.95,alpha*2.5)})" font-family="sans-serif">${l.t}</text>`;});
  const arc=60*Math.PI/180,ar=(dirDeg-90)*Math.PI/180,a1=ar-arc/2,a2=ar+arc/2;
  const x1=cx+Math.cos(a1)*R*.97,y1=cy+Math.sin(a1)*R*.97,x2=cx+Math.cos(a2)*R*.97,y2=cy+Math.sin(a2)*R*.97;
  s+=`<path d="M${x1},${y1} A${R*.97},${R*.97} 0 0,1 ${x2},${y2}" fill="none" stroke="${windColor}" stroke-width="4" stroke-linecap="round" opacity="${Math.min(1,alpha*3)}"/>`;
  const px2=cx+Math.cos(ar)*(R*.72),py2=cy+Math.sin(ar)*(R*.72),plx=cx+Math.cos(ar)*(R*.58),ply=cy+Math.sin(ar)*(R*.58),pw=R*.08;
  s+=`<polygon points="${px2},${py2} ${plx+Math.cos(ar+Math.PI/2)*pw},${ply+Math.sin(ar+Math.PI/2)*pw} ${plx+Math.cos(ar-Math.PI/2)*pw},${ply+Math.sin(ar-Math.PI/2)*pw}" fill="${windColor}" opacity="${Math.min(1,alpha*3)}"/>`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${R*.045}" fill="${sa}"/>`;return s;
}

function barbSvg(dir,kn){const dm={N:0,NNE:22,NE:45,ENE:67,E:90,ESE:112,SE:135,SSE:157,S:180,SSW:202,SW:225,WSW:247,W:270,WNW:292,NW:315,NNW:337};const deg=dm[dir]??270,r=deg*Math.PI/180,cx=9,cy=9,l=6;const x2=cx+Math.sin(r)*l,y2=cy-Math.cos(r)*l,x1=cx-Math.sin(r)*l,y1=cy+Math.cos(r)*l;const hx=x2-Math.sin(r-.44)*3.5,hy=y2+Math.cos(r-.44)*3.5;const c=kn>=20?'#c0392b':kn>=13?'#c97d0a':'#2a9d5c';return `<svg width="18" height="18" viewBox="0 0 18 18" style="display:inline-block;vertical-align:middle"><line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}" stroke-width="2" stroke-linecap="round"/><line x1="${x2}" y1="${y2}" x2="${hx}" y2="${hy}" stroke="${c}" stroke-width="2" stroke-linecap="round"/></svg>`;}

function setDpTab(t){dpTab=t;['today','pro','week'].forEach(k=>document.getElementById('dpt-'+k).className='dp-tab'+(k===t?' active':''));if(t==='today')renderDpToday();if(t==='pro')renderDpPro();if(t==='week')renderDpWeek();}

function closeCam(){document.getElementById('cam-modal').className='cam-modal-bg';}
function drawCamFrame(cv,s){
  cv.width=360;cv.height=195;const ctx=cv.getContext('2d'),W=360,H=195;
  const sg=ctx.createLinearGradient(0,H*.45,0,H);sg.addColorStop(0,'#2a6a9a');sg.addColorStop(1,'#0d3558');ctx.fillStyle=sg;ctx.fillRect(0,H*.45,W,H*.55);
  const sk=ctx.createLinearGradient(0,0,0,H*.45);sk.addColorStop(0,'#6aa8d8');sk.addColorStop(1,'#9ec8e8');ctx.fillStyle=sk;ctx.fillRect(0,0,W,H*.45);
  ctx.fillStyle='#c8b578';ctx.fillRect(0,H*.43,W,H*.06);
  if(s.status==='go'||s.status==='maybe'){const kc=['#e03030','#2a6ac0','#f5a020'];for(let i=0;i<3;i++){const kx=70+i*100,ky=35+Math.cos(i*1.7)*15;ctx.save();ctx.translate(kx,ky);ctx.fillStyle=kc[i];ctx.globalAlpha=.9;ctx.beginPath();ctx.moveTo(0,-11);ctx.lineTo(8,0);ctx.lineTo(0,13);ctx.lineTo(-8,0);ctx.closePath();ctx.fill();ctx.restore();ctx.globalAlpha=1;}}
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(0,H-22,W,22);ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='bold 10px sans-serif';ctx.textAlign='left';
  ctx.fillText(`${s.name}  ·  ${s.wind}/${s.gusts}kn ${s.dir}  ·  ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`,8,H-7);
}

function selectSpot(id){activeId=id;arrowParticles=[];renderAll();if(dpOpen)openDetail(id);}
function setFilter(f,el){filter=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderList();}
function setTemp(u){tempUnit=u;document.getElementById('tc-btn').className='tt-btn'+(u==='C'?' active':'');document.getElementById('tf-btn').className='tt-btn'+(u==='F'?' active':'');renderList();if(dpOpen){if(dpTab==='today')renderDpToday();if(dpTab==='pro')renderDpPro();if(dpTab==='week')renderDpWeek();}}
function toggleTilt(){tilt=!tilt;document.getElementById('tilt-btn').className='tilt-btn'+(tilt?' on':'');arrowParticles=[];renderPins();drawMap();}
function setLayer(l){layer=l;['sat','wind','rain'].forEach(k=>document.getElementById('lb-'+k).className='lb'+(k===l?' on':''));drawMap();}
function onSearch(v){
  document.getElementById('sclr').style.display=v?'block':'none';
  const dr=document.getElementById('sdrop');if(!v.trim()){dr.className='sdrop';return;}
  const q=v.toLowerCase(),hits=SPOTS.filter(s=>s.name.toLowerCase().includes(q)||s.region.toLowerCase().includes(q)).slice(0,5);
  if(!hits.length){dr.innerHTML=`<div class="sdr" style="color:#888">No spots found</div>`;dr.className='sdrop open';return;}
  dr.innerHTML=hits.map(s=>`<div class="sdr" onclick="selectSpot(${s.id});clearS()"><svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" style="opacity:.4"><path d="M7 1a4 4 0 014 4c0 4-4 8-4 8S3 9 3 5a4 4 0 014-4z"/><circle cx="7" cy="5" r="1.3"/></svg><div class="sdr-info"><div class="sdr-name">${s.name}</div><div class="sdr-sub">${s.region}</div></div><span class="sdr-pill" style="background:${SBG[s.status]};color:${STXT[s.status]}">${s.status==='go'?'Go':s.status==='maybe'?'Maybe':'No go'}</span></div>`).join('');
  dr.className='sdrop open';
}
function clearS(){document.getElementById('sinput').value='';document.getElementById('sclr').style.display='none';document.getElementById('sdrop').className='sdrop';}
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))document.getElementById('sdrop').className='sdrop';});

/* ── COLUMN RESIZE ── */
let colDragging=false,colX0=0,colW0=0;
document.getElementById('col-resize').addEventListener('mousedown',e=>{
  colDragging=true;colX0=e.clientX;colW0=document.getElementById('left-col').offsetWidth;
  document.addEventListener('mousemove',onColDrag);document.addEventListener('mouseup',endColDrag);e.preventDefault();
});
function onColDrag(e){if(!colDragging)return;const appW=document.getElementById('app').offsetWidth;const newW=Math.max(200,Math.min(appW-220,colW0+(e.clientX-colX0)));document.getElementById('left-col').style.width=newW+'px';drawMap();renderPins();renderMapRose();computeZoneWidths();}
function endColDrag(){colDragging=false;document.removeEventListener('mousemove',onColDrag);document.removeEventListener('mouseup',endColDrag);}
window.addEventListener('resize',()=>setTimeout(()=>{drawMap();renderPins();renderMapRose();arrowParticles=[];computeZoneWidths();},60));

/* ── BOOT ── */
function renderAll(){drawMap();renderPins();renderMapRose();renderList();renderWindLegend();startAnimation();}
renderAll();
</script>
</body>
</html>
